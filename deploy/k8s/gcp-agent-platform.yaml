apiVersion: v1
kind: ServiceAccount
metadata:
  name: br3eze-invoice-agent
  namespace: br3eze
  annotations:
    iam.gke.io/gcp-service-account: br3eze-a2a-agent@YOUR_PROJECT.iam.gserviceaccount.com
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: br3eze-a2a-agent
spec:
  displayName: "Br3eze A2A Agent"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: br3eze-a2a-agent-workload-identity
spec:
  member: serviceAccount:YOUR_PROJECT.svc.id.goog[br3eze/br3eze-invoice-agent]
  role: roles/iam.workloadIdentityUser
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: br3eze-a2a-agent
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: br3eze-a2a-agent-platform-user
spec:
  member: serviceAccount:br3eze-a2a-agent@YOUR_PROJECT.iam.gserviceaccount.com
  role: roles/aiplatform.agentPlatformUser # Gives A2A access
  resourceRef:
    apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
    kind: Project
    external: projects/YOUR_PROJECT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: br3eze-invoice-processor
  namespace: br3eze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: br3eze-agent
  template:
    metadata:
      labels:
        app: br3eze-agent
        agent.br3eze.io/id: invoice-processor
        a2a.br3eze.io/enabled: "true"
    spec:
      serviceAccountName: br3eze-invoice-agent
      containers:
        - name: agent
          image: gcr.io/YOUR_PROJECT/br3eze-invoice:1.1.0
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: YOUR_PROJECT
            - name: A2A_GATEWAY_ENDPOINT
              value: https://agent-platform.googleapis.com
            - name: SPIFFE_ID
              value: spiffe://YOUR_PROJECT.svc.id.goog/ns/br3eze/sa/br3eze-invoice-agent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: workload-spiffe-credentials
              mountPath: /var/run/secrets/workload-spiffe-credentials
              readOnly: true
      volumes:
        - name: workload-spiffe-credentials
          projected:
            sources:
              - downwardAPI:
                  items:
                    - path: "spiffe_id"
                      fieldRef:
                        fieldPath: metadata.annotations['iam.gke.io/spiffe-id']
---
# Cloud Endpoints for external A2A access
apiVersion: v1
kind: Service
metadata:
  name: br3eze-invoice-processor
  namespace: br3eze
  annotations:
    cloud.google.com/backend-config: '{"default": "a2a-backend-config"}'
spec:
  type: LoadBalancer
  selector:
    app: br3eze-agent
  ports:
    - port: 443
      targetPort: 8080
      name: https-a2a
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: a2a-backend-config
spec:
  securityPolicy:
    name: a2a-spiffe-security-policy
