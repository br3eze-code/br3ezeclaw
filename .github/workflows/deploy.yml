name: Deploy AgentOS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'helm/**'
      - 'Dockerfile'
      - 'package.json'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:.
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create secrets
        run: |
          kubectl create secret generic agentos \
            --from-literal=gateway-token=${{ secrets.GATEWAY_TOKEN }} \
            --from-literal=audit-secret=${{ secrets.AUDIT_SECRET }} \
            --from-literal=gemini-api-key=${{ secrets.GEMINI_API_KEY }} \
            --from-literal=mikrotik-api-token=${{ secrets.MIKROTIK_API_TOKEN }} \
            --from-literal=aws-access-key-id=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=aws-secret-access-key=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --from-file=gcp-sa-key=/dev/null \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create workspace ConfigMap
        run: |
          kubectl create configmap agentos-workspace \
            --from-file=workspace.json=./workspace.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          helm upgrade --install agentos./helm/agentos \
            --namespace agentos \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image }} \
            --set ingress.hosts[0].host=agentos.yourdomain.com \
            --wait --timeout 5m

      - name: Verify
        run: |
          kubectl rollout status deployment/agentos -n agentos
          kubectl get ing -n agentos
