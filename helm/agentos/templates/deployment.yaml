apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname". }}
spec:
  replicas: {{.Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels". | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels". | nindent 8 }}
    spec:
      containers:
        - name: agentos
          image: "{{.Values.image.repository }}:{{.Values.image.tag }}"
          imagePullPolicy: {{.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: gateway-token
            - name: AUDIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: audit-secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: gemini-api-key
            - name: DRIVER_MIKROTIK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: mikrotik-api-token
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: aws-access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.fullname". }}
                  key: aws-secret-access-key
                  optional: true
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace.json
              subPath: workspace.json
            - name: gcp-sa-key
              mountPath: /var/secrets/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml.Values.resources | nindent 12 }}
      volumes:
        - name: workspace
          configMap:
            name: {{ include "agentos.fullname". }}-workspace
        - name: gcp-sa-key
          secret:
            secretName: {{ include "agentos.fullname". }}
            items:
              - key: gcp-sa-key
                path: sa-key.json
                mode: 0400
