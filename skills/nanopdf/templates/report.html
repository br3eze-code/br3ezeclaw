<!-- skills/nanopdf/templates/report.html -->
<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Georgia, serif; margin: 40px; line-height: 1.6; }
    h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
    h2 { color: #555; margin-top: 30px; }
    .meta { color: #666; font-size: 14px; margin-bottom: 30px; }
    .section { margin: 20px 0; }
    .metric { display: inline-block; margin: 10px 20px 10px 0; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    .metric-value { font-size: 24px; font-weight: bold; color: #2c5aa0; }
    .metric-label { font-size: 12px; color: #666; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2c5aa0; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <h1>{{title}}</h1>
  <div class="meta">
    Generated on {{date}} | {{author}}
  </div>

  <div class="section">
    <h2>Summary</h2>
    <div class="metric">
      <div class="metric-value">{{totalRecords}}</div>
      <div class="metric-label">Total Records</div>
    </div>
    <div class="metric">
      <div class="metric-value">{{successRate}}%</div>
      <div class="metric-label">Success Rate</div>
    </div>
    <div class="metric">
      <div class="metric-value">{{avgTime}}s</div>
      <div class="metric-label">Avg Response</div>
    </div>
  </div>

  <div class="section">
    <h2>Details</h2>
    <table>
      <thead>
        <tr>
          {{#headers}}
          <th>{{.}}</th>
          {{/headers}}
        </tr>
      </thead>
      <tbody>
        {{#rows}}
        <tr>
          {{#cells}}
          <td>{{.}}</td>
          {{/cells}}
        </tr>
        {{/rows}}
      </tbody>
    </table>
  </div>

  <div class="section">
    <h2>Notes</h2>
    <p>{{notes}}</p>
  </div>
</body>
</html>
